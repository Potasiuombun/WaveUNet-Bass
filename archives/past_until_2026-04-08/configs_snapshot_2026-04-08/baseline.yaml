# Wave-U-Net Loudness Enhancement — Baseline Config (temp_data_outputs)
# Recommended thesis-grade rebuild path.
#
# Prepare dataset:
#   python scripts/prepare_dataset.py \
#       --data-root /mnt/f/fma_small/temp_data \
#       --output /mnt/f/fma_small/datasets/waveunet_baseline.pkl \
#       --input-suffix _reference_clipped.npy \
#       --target-suffix _admm_processed.npy \
#       --frame-size 1024 --hop-size 512 --threshold 0.5
#
# Train:
#   python scripts/train.py \
#       --config configs/baseline.yaml \
#       --dataset-file /mnt/f/fma_small/datasets/waveunet_baseline.pkl

experiment_name: baseline_temp_data_outputs

data:
  source_type: temp_data_outputs
  data_root: /mnt/f/fma_small/temp_data
  input_suffix: _reference_clipped.npy
  target_suffix: _admm_processed.npy
  frame_size: 1024
  hop_size: 512
  threshold: 0.5
  normalization: none
  split_by: track_id
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42

model:
  name: waveunet
  in_channels: 1
  out_channels: 1
  depth: 5
  base_channels: 32
  kernel_size: 9
  dropout: 0.1
  residual: true
  output_head: identity

loss:
  l1_weight: 1.0
  nmse_weight: 1.0
  mrstft_weight: 1.0

train:
  batch_size: 32
  epochs: 100
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  early_stopping_patience: 10

eval:
  save_audio_examples: true
  save_waveform_plots: true
  save_spectrogram_plots: true

