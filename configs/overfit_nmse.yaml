# Overfit test: batch_size=64, drive NMSE to 0
# Trains on full dataset with no early stopping, high learning rate, high NMSE weight

experiment_name: overfit_nmse_bz64

data:
  source_type: temp_data_outputs
  data_root: /mnt/f/fma_small/temp_data
  input_suffix: _reference_clipped.npy
  target_suffix: _admm_processed.npy
  frame_size: 1024
  hop_size: 512
  threshold: 0.5
  normalization: none
  split_by: track_id
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42

model:
  name: waveunet
  in_channels: 1
  out_channels: 1
  depth: 5
  base_channels: 32
  kernel_size: 9
  dropout: 0.0  # Disable dropout for overfitting
  residual: true
  output_head: identity

loss:
  l1_weight: 0.0      # Focus on NMSE only
  nmse_weight: 1.0
  mrstft_weight: 0.0

train:
  batch_size: 64
  epochs: 500       # High max to let early stopping (patience) control
  optimizer: adamw
  lr: 1.0e-3        # Higher LR for faster convergence
  weight_decay: 0.0
  grad_clip: 1.0
  early_stopping_patience: 50  # Long patience to reach NMSE=0

eval:
  save_audio_examples: false
  save_waveform_plots: false
  save_spectrogram_plots: false
