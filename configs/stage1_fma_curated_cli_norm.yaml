experiment_name: stage1_fma_curated_cli_norm
seed: 42

data:
  source_type: serialized
  dataset_file: datasets/stage1_fma_curated_cli_norm.pkl
  frame_size: 1024
  sr: 44100

model:
  name: waveunet
  type: waveunet
  in_channels: 1
  out_channels: 1
  depth: 5
  base_channels: 32
  kernel_size: 9
  output_head: identity

loss:
  l1_weight: 1.0
  nmse_weight: 1.0
  mrstft_weight: 1.0

train:
  batch_size: 16
  epochs: 8
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  early_stopping_patience: 4
  checkpoint_dir: checkpoints/stage1_fma_curated_cli_norm

logging:
  csv_log: logs/stage1_fma_curated_cli_norm_metrics.csv
  json_log: logs/stage1_fma_curated_cli_norm_metrics.jsonl
