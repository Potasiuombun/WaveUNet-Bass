experiment_name: attention_vae_cyclical
seed: 42

data:
  dataset_file: /mnt/f/fma_small/datasets/waveunet_baseline_small.pkl
  frame_size: 1024
  sr: 48000

model:
  name: attention_vae_waveunet
  type: attention_vae_waveunet
  in_channels: 1
  out_channels: 1
  depth: 5
  base_channels: 32
  kernel_size: 9
  latent_channels: 64
  output_head: identity
  attention_heads: 8
  attention_dropout: 0.1
  attention_layers: 3
  attention_mlp_ratio: 2.0

loss:
  alpha_reconstruction: 1.0
  gamma_mrstft: 1.0
  # Legacy fields kept for backward compat with normalize_config;
  # the kl_schedule block below takes precedence.
  beta_kl: 5.0e-5
  beta_kl_start: 0.0
  beta_kl_end: 5.0e-5
  kl_warmup_epochs: 0
  l1_weight: 1.0
  nmse_weight: 1.0
  mrstft_fft_sizes: [1024, 512, 256]
  mrstft_hop_sizes: [512, 256, 128]

# Cyclical KL annealing (Fu et al., 2019).
# 30 epochs / 4 cycles = 7.5 epochs per cycle.
# First 50 % of each cycle (≈3.75 epochs) is the warmup ramp; the rest is plateau.
# beta_max is halved vs. the previous linear run (1e-4 → 5e-5) to reduce KL pressure.
kl_schedule:
  type: cyclical
  beta_start: 0.0
  beta_max: 5.0e-5
  num_cycles: 4
  cycle_ratio: 0.5

# Free bits disabled by default; enable and set value > 0 to prevent collapse.
kl_free_bits:
  enabled: false
  value: 0.0

training:
  batch_size: 16
  num_workers: 2
  num_epochs: 30
  optimizer: adamw
  lr: 3.0e-5
  weight_decay: 1.0e-4
  gradient_clip: 1.0
  early_stopping_patience: 10
  checkpoint_dir: checkpoints/attention_vae_cyclical
  warm_start_checkpoint: checkpoints/mhsa_stage1/best.pth

logging:
  csv_log: logs/attention_vae_cyclical_metrics.csv
  json_log: logs/attention_vae_cyclical_metrics.jsonl
